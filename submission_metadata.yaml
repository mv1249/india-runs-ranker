# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude Code (claude-sonnet-4-6) for architecture design, code generation,
  and feature engineering logic. No candidate data was passed to any LLM at
  inference time. All scoring is deterministic feature engineering + pre-computed
  SBERT embeddings. Claude was used as a development accelerator, not for candidate
  evaluation.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal cascade ranker combining SBERT semantic similarity with trust-weighted
  structured features. Five components:

  1. SBERT Career Similarity (35%): all-MiniLM-L6-v2 embeds each candidate's full
     career description history and computes cosine similarity against a JD query
     vector. This surfaces "plain-language" candidates who built retrieval systems
     without using buzz terms.

  2. SBERT Skill Similarity (20%): trust-weighted skill text (skills repeated
     proportional to proficiency × endorsements × duration) embedded and compared
     against JD skill keywords. Kills keyword stuffers: "advanced Fine-tuning,
     4 months, 4 endorsements" scores near zero while "expert Pinecone, 88 months,
     34 endorsements" scores high.

  3. Skill Trust Score (20%): explicit Tier-A/B/C skill taxonomy with per-skill
     weight = proficiency × log(1+endorsements) × log(1+duration_months).
     Tier-A includes FAISS, Qdrant, BM25, LTR, NDCG, sentence-transformers.

  4. Career Trajectory (12%): product-company premium, ML-title tenure bonus,
     and a 0.25× penalty for consulting-only histories (Wipro/TCS/Infosys/Accenture).

  5. Behavioral Availability (8%, multiplicative): composite of open_to_work_flag,
     last_active recency decay over 180 days, recruiter_response_rate,
     interview_completion_rate, offer_acceptance_rate, and notice period bucket.

  Honeypot defense: candidates with impossible timelines (career_months > claimed_yoe
  + 3 years) or ≥4 expert/advanced skills with zero duration receive a hard zero.

  Ranking step runtime: ~5 seconds on CPU (numpy matmul over pre-loaded arrays).

